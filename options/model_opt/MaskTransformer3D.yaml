## @package _global_ # remove first # to enable merging into top-level namespace
model: mask_transformer
model_architecture: MaskTransformer3D

netG:
  net_type: MaskTransformer3D
  description: "3D Masked Autoencoder with Vector Quantization (VQTransformer3D)"
  mask_schedule: arccos

  # Must match the num_embeddings of the pretrained VQ model (path.pretrained_vqmodel_id)
  num_embeddings: 512  # the +1 token for the mask token is added internally

  # seq_len = D' * H' * W' where (D', H', W') is the spatial shape of the VQ encoder output.
  # VQVAE3D (2x DownBlocks, 4x downsampling): patch_size=64 -> 16^3 = 4096
  # VQGAN3D (4x DownBlocks, 16x downsampling): patch_size=64 -> 4^3 = 64
  seq_len: 4096

  embed_dim: 512
  depth: 12
  num_heads: 6     # must evenly divide embed_dim
  mlp_ratio: 4
  dropout: 0.1
  use_checkpoint: true  # enable checkpointing to save memory (at the cost of extra computation)

  init_type: default     # VQTransformer3D initialises its own weights; this skips select_network init
  init_bn_type: uniform
  init_gain: 0.2
