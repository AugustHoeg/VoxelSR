## @package _global_ # remove first # to enable merging into top-level namespace
model: plain
model_architecture: MTVNet
netG:

  net_type: "MTVNet"
  description: "Mapping using Transformers for Volumes – Network for Super-Resolution with Long-Range Interactions"

  in_channels: 1
  shallow_feats: [ 128 ]
  pre_up_feats: [ 64, 64 ]
  num_levels: 1
  context_sizes: [ 32 ]
  num_blks: [ 3 ] #[ 3 ]
  blk_layers: [ 6, 6, 6 ]
  ct_embed_dims: [ 128, 128, 128 ]
  embed_dims: [ 128, 128, 128 ]
  ct_size: 2
  ct_pool_method: "conv"
  patch_sizes: [ 2 ]
  num_heads: 4
  attn_window_sizes: [ 8, 8, 8 ]
  drop_path: 0.1
  upsample_method: "pixelshuffle3D"
  token_upsample_method: "deconv_nn_resize"
  use_checkpoint: true
  enable_ape_ct: true
  enable_ape_x: false
  enable_ct_rpb: true
  enable_conv_skip: false
  enable_long_skip: true
  enable_shift: true
  patch_pe_method: "window_relative"
  layer_type: "fastervit"

  init_type: "kaiming_normal"
  init_bn_type: "uniform"      # "uniform" | "constant"
  init_gain: 0.1