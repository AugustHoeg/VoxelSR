## @package _global_ # remove first # to enable merging into top-level namespace
model: aesop
model_architecture: AESOP3D
netG:
  net_type: AESOP3D
  description: "Auto-Encoded Supervision for Perceptual Image Super-Resolution"

  enc_opt:
    in_nc: 1
    nf: 64
    gc: 32
    nb: 2

  dec_opt:
    in_nc: 1
    out_nc: 1
    nf: 64
    gc: 32
    nb: 10
    upsample_method: nearest
    use_checkpoint: true

  init_type: default
  init_bn_type: uniform  # "uniform" | "constant"
  init_gain: 0.2