## @package _global_ # remove first # to enable merging into top-level namespace
model: plain
model_architecture: ConvNeXtSR
netG:
  net_type: ConvNeXtSR
  description: "ConvNeXtSR"

  in_channels: 1
  depths: [6, 6, 6, 6, 6, 6]  # [3, 3, 3, 3]
  dims: [192, 192, 192, 192, 192, 192]  # [96, 96, 96, 96], original: [96, 192, 384, 768]
  drop_path_rate: 0.1
  layer_scale_init_value: 1e-6
  use_checkpoint: true

  upsample_method: pixelshuffle3D
  init_type: kaiming_normal
  init_bn_type: uniform
  init_gain: 0.2
