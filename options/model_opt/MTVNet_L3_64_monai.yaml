## @package _global_ # remove first # to enable merging into top-level namespace
model: plain
model_architecture: MTVNet
netG:

  net_type: MTVNet
  description: "Mapping using Transformers for Volumes – Network for Super-Resolution with Long-Range Interactions"

  use_monai: true

  in_channels: 1
  shallow_feats: [ 32, 64, 128 ]
  pre_up_feats: [ 64, 64 ]
  num_levels: 3
  context_sizes: [ 64, 48, 32 ]
  num_blks: [ 1, 2, 3 ]
  blk_layers: [ 3, 3, 3 ]  # [6, 6, 6]
  embed_dims: [120, 180, 240]
  patch_sizes: [ 4, 3, 2 ]
  skip_dims: [ 60, 60, 60 ]
  mlp_ratio: 4
  num_heads: 4
  attn_window_sizes: [ 8, 8, 8 ]
  drop_path: 0.1
  upsample_method: nearest
  token_upsample_method: deconv_nn_resize
  use_checkpoint: true

  init_type: kaiming_normal
  init_bn_type: uniform   # "uniform" | "constant"
  init_gain: 0.1