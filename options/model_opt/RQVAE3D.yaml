## @package _global_
model: vqvae
model_architecture: RQVAE3D
netG:
  net_type: RQVAE3D
  description: "3D Residual-Quantized VAE (RQVAE3D)"
  in_channels: 1
  latent_dim: 256
  n_embed: 1024          # codebook size per depth level
  n_rq_depth: 4          # number of residual quantization steps
  num_res_blocks: 2
  decay: 0.99            # EMA decay for codebook updates
  shared_codebook: false # share one codebook across all RQ depths
  restart_unused_codes: true
  use_checkpoint: false

  init_type: default
  init_bn_type: uniform
  init_gain: 0.2
