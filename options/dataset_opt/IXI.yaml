## @package _global_ # remove first # to enable merging into top-level namespace
name: IXI
dataset_type: CacheDataset
enable_femur_padding: false

# Cropping and normalization
n_channels: 1
patch_size: 32
channel_dim: no_channel
norm_type: scale_intensity
patch_crop_type: random_spatial

# Sample crop and padding
sample_crop_pad_type : sample_divisible_padding # "sample_divisible_padding" "sample_crop_foreground"

# Data augmentation
degradation_type: resize # "resize" "kspace_trunc"
trunc_factor: 3.0 # k-space truncation factor
kspace_trunc_dim: 3 # k-space truncation dimension

downsampling_method: linear
blur_method: 3d_gaussian_blur
blur_sigma: 1.0

# Dataset and dataloader parameters
train_dataset_params:
  patches_per_batch: 1
  replace_rate: 0.10
  cache_num: 2000
  init_workers: 2
  replace_workers: 2

train_dataloader_params:
  dataloader_shuffle: false
  dataloader_batch_size: 4
  num_load_workers: 2
  persist_workers: true
  pin_memory: false

test_dataset_params:
  patches_per_batch: 1
  replace_rate: 0.10
  cache_num: 2000
  init_workers: 2
  replace_workers: 2

test_dataloader_params:
  dataloader_shuffle: false
  dataloader_batch_size: 4
  num_load_workers: 0
  persist_workers: false
  pin_memory: false

